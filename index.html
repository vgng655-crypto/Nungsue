        * {

        body {

        header {

        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* ระบบ Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
        }

        .product-card {
            background: #f7f3f3;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            cursor: pointer; /* เปลี่ยนเมาส์เป็นรูปมือ */
            
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: contain;
            object-position: center;
            border-radius: 10px;
        }

        .product-info {
            padding: 10px;
            text-align: center;
        }

        .product-name {
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .product-price {
            color: #0077ff;
            font-weight: bold;
        }

        /* --- สไตล์ของ Modal (ป๊อปอัพ) --- */
        .modal {
            display: none; /* ซ่อนไว้เริ่มต้น */
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(8, 8, 8, 0.7);
            overflow-y: auto;
            padding: 20px;
            align-items: first baseline;
            justify-content: center;
            padding: 20px;
        }

       .modal-content {
    background: linear-gradient(135deg, #a4e9a4, #92b1da);
    padding: 2rem;
    border-radius: 16px;
    width: 90%;
    max-width: 600px;
    position: relative;
    text-align: center;

    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    border: 2px solid rgba(0,0,0,0.05);

    animation: pop 0.25s ease;
}
@keyframes pop {
    from {
        transform: scale(0.8);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}
.modal {
    background-color: rgba(0, 0, 0, 0.75);
    backdrop-filter: blur(5px);
}

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .close-btn {
            position: sticky;
            top: 0;
            float: right;
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
            color: #000;
            background: wheat;
            border-radius: 50%;
            padding: 0 12px;
            z-index: 9999;
        }

        .modal-img {

    // 2. ฟังก์ชันแสดงสินค้าในหน้าเว็บ
    const gameZone = document.getElementById("gameZone");
const appZone = document.getElementById("appZone");
const topupZone = document.getElementById("topupZone");

products.forEach(product => {

    const card = document.createElement("div");
    card.className = "product-card";
    card.onclick = () => openModal(product);

    card.innerHTML = `
        <img src="${product.image}" class="product-image">
        <div class="product-info">
            <div class="product-name">${product.name}</div>
            <div class="product-price">${product.price}</div>
        </div>
    `;

    if (product.category === "game") {
        gameZone.appendChild(card);
    }

    else if (product.category === "app") {
        appZone.appendChild(card);
    }

    else if (product.category === "topup") {
        topupZone.appendChild(card);
    }
});


    // 3. ฟังก์ชันควบคุม Modal
    const modal = document.getElementById('productModal');

    function openModal(product) {
        document.getElementById('modalTitle').innerText = product.name;
        document.getElementById('modalPrice').innerText = product.price;
        document.getElementById('modalDesc').innerText = product.description;
        document.getElementById('modalImg').src = product.image;
            const whatsappBtn =
        document.querySelector('.whatsapp');
            whatsappBtn.href =
        "https://wa.me/8562099340962?text="+
        encodeURIComponent(product.message);
        
        

        
            modal.style.display = "flex";
    }

    function closeModal() {
        modal.style.display = "none";
    }

    // ปิด Modal เมื่อคลิกพื้นที่ว่างข้างนอก
    window.onclick = function(event) {
        if (event.target == modal) {
            closeModal();
        }
    }
