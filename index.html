.product-image-wrapper {

@property --angle {

}

        .modal {
            display: none; /* ซ่อนไว้เริ่มต้น */
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(8, 8, 8, 0.7);
            overflow-y: auto;
            padding: 20px;
            align-items: first baseline;
            justify-content: center;
            padding: 20px;
        }

    background: linear-gradient(135deg, #a4e9a4, #92b1da);

    position: relative;
    text-align: center;

    border: 2px solid rgba(0,0,0,0.05);

    from {

    to {

    }
}
.modal {

    function showZone(type) {

    const game = document.getElementById("gameZone");
    const app = document.getElementById("appZone");
    const topup = document.getElementById("topupZone");

    const gameTitle = document.querySelector(".game-title");
    const appTitle = document.querySelector(".app-title");
    const topupTitle = document.querySelector(".topup-title");

    // ซ่อนทั้งหมดก่อน
    game.style.display = "none";
    app.style.display = "none";
    topup.style.display = "none";

    gameTitle.style.display = "none";
    appTitle.style.display = "none";
    topupTitle.style.display = "none";

    // แสดงเฉพาะที่เลือก
    if (type === "game") {
        game.style.display = "grid";
        gameTitle.style.display = "block";
    }

    if (type === "app") {
        app.style.display = "grid";
        appTitle.style.display = "block";
    }

    if (type === "topup") {
        topup.style.display = "grid";
        topupTitle.style.display = "block";
    }
}

    // 2. ฟังก์ชันแสดงสินค้าในหน้าเว็บ
    const gameZone = document.getElementById("gameZone");
const appZone = document.getElementById("appZone");
const topupZone = document.getElementById("topupZone");

products.forEach(product => {

    const card = document.createElement("div");
    card.className = "product-card";
    card.onclick = () => openModal(product);

    card.innerHTML = `
        <div class="product-image-wrapper">
    <img src="${product.image}" class="product-image">
</div>
        <div class="product-info">
            <div class="product-name">${product.name}</div>
            <div class="product-price">${product.price}</div>
        </div>
    `;

    if (product.category === "game") {
        gameZone.appendChild(card);
    }

    else if (product.category === "app") {
        appZone.appendChild(card);
    }

    else if (product.category === "topup") {
        topupZone.appendChild(card);
    }
});


    // 3. ฟังก์ชันควบคุม Modal
    const modal = document.getElementById('productModal');

    function openModal(product) {
        document.getElementById('modalTitle').innerText = product.name;
        document.getElementById('modalPrice').innerText = product.price;
        document.getElementById('modalDesc').innerText = product.description;
        document.getElementById('modalImg').src = product.image;
            const whatsappBtn =
        document.querySelector('.whatsapp');
            whatsappBtn.href =
        "https://wa.me/66649069984?text="+
        encodeURIComponent(product.message);
        
        

        
            modal.style.display = "flex";
    }

    function closeModal() {
        modal.style.display = "none";
    }

    // ปิด Modal เมื่อคลิกพื้นที่ว่างข้างนอก
    window.onclick = function(event) {
        if (event.target == modal) {
            closeModal();
        }
    }
    
</script>
