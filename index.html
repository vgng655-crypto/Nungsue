    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-image: url(https://cdn.phototourl.com/member/2026-04-26-aad497de-69d4-4b3e-952c-cfe1bdc65d00.jpg);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        header {
            background-image: url();
            color: #000000;
            padding: 2rem;
            text-align: center;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* ระบบ Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
        }

        .product-card {
            background: #f7f3f3;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            cursor: pointer; /* เปลี่ยนเมาส์เป็นรูปมือ */
            
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: contain;
            object-position: center;
            border-radius: 10px;
        }

        .product-info {
            padding: 10px;
            text-align: center;
        }

        .product-name {
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .product-price {
            color: #961e1e;
            font-weight: bold;
        }

        /* --- สไตล์ของ Modal (ป๊อปอัพ) --- */
        .modal {
            display: none; /* ซ่อนไว้เริ่มต้น */
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(8, 8, 8, 0.7);
            overflow-y: auto;
            padding: 20px;
            align-items: first baseline;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background-color: #fff;
            padding: 2rem;
            border-radius: 12px;
            width: 100;
            max-width: 600px;
            position: relative;
            text-align: center;
            margin-top: 20px;
            margin-bottom: 20px;
            max-height: none;
            overflow: visible;
            
            
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .close-btn {
            position: sticky;
            top: 0;
            float: right;
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
            color: #000;
            background: wheat;
            border-radius: 50%;
            padding: 0 12px;
            z-index: 9999;
        }

        .modal-img {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            margin-bottom: 1rem;
            border-radius: 8px;
        }

        .modal-desc {
            margin: 1rem 0;
            color: #0c0c0c;
            text-align: left;
        }

        /* ส่วนติดต่อเรา */

            text-align: center;

            gap: 20px;

            margin-top: 1rem;
        }

            text-decoration: none;
            color: #111010;
            font-weight: bold;

}

        card.className = 'product-card';
        card.onclick = () => openModal(product); // เมื่อคลิกให้เปิด Modal
        
        card.innerHTML = `
            <img src="${product.image}" alt="${product.name}" class="product-image">
            <div class="product-info">

                <div class="product-price">${product.price}</div>
            </div>
        `;
        productGrid.appendChild(card);
    });

    // 3. ฟังก์ชันควบคุม Modal
    const modal = document.getElementById('productModal');

    function openModal(product) {
        document.getElementById('modalTitle').innerText = product.name;
        document.getElementById('modalPrice').innerText = product.price;
        document.getElementById('modalDesc').innerText = product.description;
        document.getElementById('modalImg').src = product.image;
        
        modal.style.display = "flex";
    }

    function closeModal() {
        modal.style.display = "none";
    }

    window.onclick = function(event) {
        if (event.target == modal) {
            closeModal();
        }
